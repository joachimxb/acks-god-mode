name: Feature request
description: Suggest a new feature, an unimplemented ACKS mechanic, or an improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! For larger features it's worth opening this issue to
        discuss before anyone writes code (see `CONTRIBUTING.md`). ACKS God Mode aims to
        automate ACKS II by the book — so if your request maps to a specific rule, a page
        citation helps a lot.
  - type: textarea
    id: problem
    attributes:
      label: What's the need?
      description: What are you trying to do that the tool doesn't support today?
      placeholder: e.g. There's no way to track a character's spell repertoire across levels.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Describe the feature or behavior you'd like.
    validations:
      required: true
  - type: input
    id: raw-citation
    attributes:
      label: RAW citation (if it maps to a rule)
      description: The rulebook page(s) this relates to, if any (e.g. `RR p.344`, `JJ p.99`).
      placeholder: e.g. RR pp.391–395
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds (optional)
      description: Anything you currently do to work around the lack of this feature.
    validations:
      required: false
